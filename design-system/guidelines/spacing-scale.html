<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="8px base grid · space-1 → space-9" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--green-400); border-radius: var(--radius-xs); width: 22px; }
  .t { font-size: 10px; color: var(--text-muted); }
  .t b { color: var(--text-strong); display: block; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="t"><b>1</b>4px</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="t"><b>2</b>8px</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="t"><b>3</b>12px</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="t"><b>4</b>16px</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="t"><b>5</b>24px</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="t"><b>6</b>32px</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="t"><b>7</b>40px</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="t"><b>8</b>48px</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="t"><b>9</b>64px</div></div>
  </div>
</body>
</html>
