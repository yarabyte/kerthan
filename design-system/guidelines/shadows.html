<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Soft, green-tinted — never pure black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display: flex; gap: 22px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .t { font-size: 10px; color: var(--text-muted); }
  .t b { color: var(--text-strong); display: block; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t"><b>xs</b></div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t"><b>sm</b></div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t"><b>md</b></div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t"><b>lg</b></div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="t"><b>xl</b></div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-gold)"></div><div class="t"><b>gold</b></div></div>
  </div>
</body>
</html>
