<!-- @dsCard group="Brand" viewport="700x210" name="Voice & motto" subtitle="Devise, slogan & institutional signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-body); }
  .motto { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .pill { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--green-800); background: var(--green-50); border: 1px solid var(--green-200); padding: 7px 16px; border-radius: var(--radius-pill); }
  .dash { color: var(--gold-500); font-weight: 700; }
  .slogan { font-family: var(--font-accent); font-weight: 700; font-size: 40px; color: var(--color-cross); line-height: 1; }
  .sig { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="motto">
    <span class="pill">ACCUEIL</span><span class="dash">—</span>
    <span class="pill">CONFORT</span><span class="dash">—</span>
    <span class="pill">COMPÉTENCE</span>
  </div>
  <div class="slogan">We Care</div>
  <div class="sig">« 20 years of compassionate care »</div>
</body>
</html>
