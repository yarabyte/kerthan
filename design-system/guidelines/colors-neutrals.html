<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Faint green-warm grays for text & surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-body); }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .step { flex: 1; height: 72px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 10px; font-weight: 600; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step" style="background:var(--neutral-0);color:#6E7C6E">0</div>
    <div class="step" style="background:var(--neutral-50);color:#6E7C6E">50</div>
    <div class="step" style="background:var(--neutral-100);color:#6E7C6E">100</div>
    <div class="step" style="background:var(--neutral-200);color:#3A453B">200</div>
    <div class="step" style="background:var(--neutral-300);color:#3A453B">300</div>
    <div class="step" style="background:var(--neutral-400);color:#fff">400</div>
    <div class="step" style="background:var(--neutral-500);color:#fff">500</div>
    <div class="step" style="background:var(--neutral-600);color:#fff">600</div>
    <div class="step" style="background:var(--neutral-700);color:#fff">700</div>
    <div class="step" style="background:var(--neutral-800);color:#fff">800</div>
    <div class="step" style="background:var(--neutral-900);color:#fff">900</div>
  </div>
</body>
</html>
