<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 26px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; gap: 28px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .cell img { display: block; }
  .seal-bg { background: var(--green-700); border-radius: var(--radius-lg); padding: 14px 18px; }
  .t { font-size: 11px; color: var(--text-muted); }
  .t b { display: block; color: var(--text-strong); font-size: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><img src="../assets/logo-20-years.png" alt="Kerthan 20 years logo" style="height:150px"><div class="t"><b>Anniversary mark</b>logo-20-years.png</div></div>
    <div class="cell"><img src="../assets/logo-seal.png" alt="Kerthan seal" style="height:130px"><div class="t"><b>Medical seal</b>logo-seal.png</div></div>
    <div class="cell"><div class="seal-bg"><img src="../assets/logo-seal.png" alt="seal on green" style="height:96px"></div><div class="t"><b>On brand green</b>min. clear space = K-height</div></div>
  </div>
</body>
</html>
