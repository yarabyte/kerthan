<!-- @dsCard group="Colors" viewport="700x150" name="Gold & Red scales" subtitle="Warm gold accent and the medical-cross red" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-body); }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 10px; }
  .step { flex: 1; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step" style="background:var(--gold-50);color:#9C6A0B">50</div>
    <div class="step" style="background:var(--gold-100);color:#9C6A0B">100</div>
    <div class="step" style="background:var(--gold-200);color:#9C6A0B">200</div>
    <div class="step" style="background:var(--gold-300);color:#9C6A0B">300</div>
    <div class="step" style="background:var(--gold-400);color:#5b3f06">400</div>
    <div class="step" style="background:var(--gold-500);color:#fff">500</div>
    <div class="step" style="background:var(--gold-600);color:#fff">600</div>
    <div class="step" style="background:var(--gold-700);color:#fff">700</div>
  </div>
  <div class="scale">
    <div class="step" style="background:var(--red-50);color:#87241F">50</div>
    <div class="step" style="background:var(--red-100);color:#87241F">100</div>
    <div class="step" style="background:var(--red-200);color:#87241F">200</div>
    <div class="step" style="background:var(--red-400);color:#fff">400</div>
    <div class="step" style="background:var(--red-500);color:#fff">500</div>
    <div class="step" style="background:var(--red-600);color:#fff">600</div>
    <div class="step" style="background:var(--red-700);color:#fff">700</div>
  </div>
</body>
</html>
