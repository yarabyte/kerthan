<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="2xs → 4xl modular ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 26px; background: var(--surface-card); font-family: var(--font-display); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border: 0; }
  .tok { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); width: 130px; flex: none; }
  .s { color: var(--text-strong); font-weight: 700; letter-spacing: -.02em; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="tok">--text-4xl · 60</span><span class="s" style="font-size:34px">Kerthan</span></div>
  <div class="r"><span class="tok">--text-2xl · 36</span><span class="s" style="font-size:28px">Kerthan</span></div>
  <div class="r"><span class="tok">--text-xl · 28</span><span class="s" style="font-size:23px">Kerthan</span></div>
  <div class="r"><span class="tok">--text-lg · 22</span><span class="s" style="font-size:20px">Kerthan clinique</span></div>
  <div class="r"><span class="tok">--text-md · 18</span><span class="s" style="font-size:18px;font-weight:500">Kerthan clinique</span></div>
  <div class="r"><span class="tok">--text-base · 16</span><span class="s" style="font-size:16px;font-weight:400">Kerthan clinique santé</span></div>
  <div class="r"><span class="tok">--text-sm · 14</span><span class="s" style="font-size:14px;font-weight:400">Kerthan clinique santé Douala</span></div>
</body>
</html>
