<!-- @dsCard group="Colors" viewport="700x190" name="Brand colors" subtitle="Green · Gold · Cross-red — the three brand pillars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .chip { height: 88px; display: flex; align-items: flex-end; padding: 10px 12px; }
  .chip span { font-family: var(--font-body); font-weight: 600; font-size: 12px; color: #fff; }
  .meta { padding: 9px 12px; background: var(--surface-card); }
  .meta b { font-family: var(--font-display); font-size: 13px; color: var(--text-strong); display: block; }
  .meta code { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-500)"><span>Aa</span></div><div class="meta"><b>Brand Green</b><code>--green-500 · #3E9B4C</code></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"><span>Aa</span></div><div class="meta"><b>Brand Gold</b><code>--gold-500 · #E8A917</code></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-500)"><span>Aa</span></div><div class="meta"><b>Cross Red</b><code>--red-500 · #C0392B</code></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"><span>Aa</span></div><div class="meta"><b>Deep Green</b><code>--green-700 · #1F6B33</code></div></div>
  </div>
</body>
</html>
