<!-- @dsCard group="Type" viewport="700x200" name="Accent & eyebrow" subtitle="Caveat handwriting + uppercase overline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); }
  .eyebrow { font-family: var(--font-body); font-weight: 600; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--color-primary); margin: 0 0 6px; }
  .script { font-family: var(--font-accent); font-weight: 700; font-size: 46px; color: var(--color-cross); line-height: 1; margin: 0; }
  .script .small { font-size: 26px; color: var(--green-700); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <p class="eyebrow">Notre engagement</p>
  <p class="script">We Care! <span class="small">20 years of compassionate care</span></p>
  <p class="meta">Caveat 700 — reserved for the human, hand-signed brand voice. Eyebrow: Lexend 600, tracking 0.14em, uppercase.</p>
</body>
</html>
