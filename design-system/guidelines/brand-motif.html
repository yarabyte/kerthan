<!-- @dsCard group="Brand" viewport="700x170" name="Motif & gradients" subtitle="Heartbeat signature + brand gradients" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-body); display: flex; gap: 22px; align-items: center; }
  .motif { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px 20px; box-shadow: var(--shadow-sm); }
  .grad { flex: 1; display: flex; gap: 14px; }
  .g { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 8px 10px; color: #fff; font-size: 11px; font-weight: 600; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
  <div class="motif"><img src="../assets/motif-heartbeat.png" alt="heartbeat" style="height:48px"></div>
  <div class="grad">
    <div class="g" style="background:var(--grad-brand)">--grad-brand</div>
    <div class="g" style="background:var(--grad-leaf)">--grad-leaf</div>
    <div class="g" style="background:var(--grad-warm)">--grad-warm</div>
  </div>
</body>
</html>
