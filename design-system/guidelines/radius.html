<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="xs → 2xl, plus pill & circle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--green-100); border: 1.5px solid var(--green-400); }
  .t { font-size: 10px; color: var(--text-muted); text-align: center; }
  .t b { color: var(--text-strong); display: block; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="t"><b>xs</b>4px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t"><b>sm</b>8px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="t"><b>md</b>12px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t"><b>lg</b>18px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="t"><b>xl</b>26px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="t"><b>2xl</b>36px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-circle)"></div><div class="t"><b>circle</b>50%</div></div>
  </div>
</body>
</html>
