<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); }
  .lab { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .grp { margin-bottom: 24px; }
  .svc { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .stats { display: flex; gap: 40px; }
  .contacts { display: flex; gap: 28px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { ServiceCard, StatCard, SectionHeading, ContactItem } = window.CliniqueKerthanDesignSystem_0add2c;
    function Demo() {
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      return (
        <div>
          <div className="grp">
            <SectionHeading eyebrow="Nos services"
              title="Un plateau technique complet"
              description="De la médecine générale au laboratoire, tous vos soins en un seul lieu." />
          </div>
          <div className="grp svc">
            <ServiceCard icon="stethoscope" title="Médecine générale" description="Consultations et suivi pour toute la famille." href="#" />
            <ServiceCard icon="heart-pulse" tone="red" title="Médecine interne" description="Maladies chroniques et cas complexes." href="#" />
            <ServiceCard icon="microscope" tone="gold" title="Laboratoire" description="Analyses biologiques fiables et rapides." href="#" />
          </div>
          <div className="grp stats">
            <StatCard value="20" suffix="ans" label="d'expérience à Douala" />
            <StatCard value="6" label="services médicaux" tone="gold" />
            <StatCard value="24/7" label="urgences" tone="red" />
          </div>
          <div className="grp contacts">
            <ContactItem icon="phone" label="Urgences" value="+237 699 41 61 53" />
            <ContactItem icon="map-pin" label="Adresse" value="1ère rue Nangah, Bonaberi" tone="gold" />
            <ContactItem icon="globe" label="Site web" value="www.kerthan.org" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
