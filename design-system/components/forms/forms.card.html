<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 22px; max-width: 640px; }
  .span { grid-column: 1 / -1; }
  .row { display: flex; gap: 22px; align-items: center; margin-top: 4px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, Checkbox, Switch } = window.CliniqueKerthanDesignSystem_0add2c;
    function Demo() {
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      return (
        <div className="grid">
          <Input label="Nom complet" placeholder="Votre nom" icon="user-round" required />
          <Input label="Téléphone" type="tel" placeholder="+237 6XX XX XX XX" icon="phone" />
          <Select className="span" label="Service souhaité" placeholder="Choisir un service"
            options={['Médecine générale', 'Médecine interne', 'Imagerie médicale', 'Laboratoire d\'analyses']} />
          <Input className="span" label="Motif de consultation" multiline placeholder="Décrivez brièvement vos symptômes…" />
          <Input label="Email" defaultValue="patient@" error="Adresse email invalide" icon="mail" />
          <div>
            <div className="row"><Checkbox label="Rappel par SMS" defaultChecked /></div>
            <div className="row"><Switch label="Patient bilingue (FR / EN)" /></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
